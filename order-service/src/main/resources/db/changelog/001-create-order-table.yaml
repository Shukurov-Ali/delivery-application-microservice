databaseChangeLog:
  - changeSet:
      id: 001
      author: ali
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: pickup_address
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: delivery_address
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: courier_id
                  type: BIGINT

              - column:
                  name: delivery_price
                  type: DECIMAL(10,2)

              - column:
                  name: status
                  type: VARCHAR(30)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP

              - column:
                  name: delivered_at
                  type: TIMESTAMP